name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint & Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  terraform:
    name: Validate (Terraform)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:                   
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (full-history scan → gate + SARIF)
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect --source=/repo --redact --report-format sarif --report-path /repo/gitleaks.sarif --exit-code 1

      - name: Upload Gitleaks SARIF  
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v3
  trivy:
    name: SCA & Image Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # Generate SARIF (never fail here)
      - name: Trivy FS scan (SARIF)
        run: trivy fs --scanners vuln --format sarif --output trivy-fs.sarif --exit-code 0 .

      - name: Build image
        run: docker build -t devsecops-demo:latest .

      - name: Trivy image scan (SARIF)
        run: trivy image --scanners vuln --ignore-unfixed --format sarif --output trivy-image.sarif --exit-code 0 devsecops-demo:latest

      # SBOM (CycloneDX) — a machine-readable inventory of everything in the image
      - name: Generate SBOM (CycloneDX)
        run: trivy image --format cyclonedx --output sbom.cdx.json devsecops-demo:latest

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json

      # enforce gates (fail on HIGH/CRITICAL)
      - name: Dependency scan — GATE (fail on HIGH/CRITICAL)
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 .

      - name: Image scan — GATE (fail on HIGH/CRITICAL, fixable only)
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 devsecops-demo:latest

      # Publish to Security tab even though a gate failed above
      - name: Upload FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        
  checkov:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:       
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Checkov
        run: pip install checkov

      - name: Scan Terraform (gate + SARIF)
        run: checkov -d terraform --compact --soft-fail --hard-fail-on CKV_AWS_53,CKV_AWS_54,CKV_AWS_55,CKV_AWS_56 -o cli -o sarif --output-file-path console,checkov.sarif

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Start the app
        run: |
          docker compose up -d --build
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/login && break
            echo "waiting for app..."; sleep 2
          done

      - name: ZAP full (active) scan (JSON report)
        run: |
          chmod 777 .
          docker run --network host -v ${{ github.workspace }}:/zap/wrk/:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py -t http://localhost:5000 -J zap.json || true

      - name: Convert ZAP JSON to SARIF
        if: always()
        run: python3 scripts/zap_to_sarif.py zap.json zap.sarif

      - name: Upload ZAP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap.sarif
          category: zap

  metrics:
    name: Metrics (speed vs security)
    runs-on: ubuntu-latest
    needs: [lint-test, terraform, gitleaks, codeql, trivy, checkov, zap]
    # Record on direct pushes only (skip PR runs) so the findings ref is a branch.
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
      actions: read
      security-events: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch run + findings data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate > jobs.json
          gh api "repos/${{ github.repository }}/code-scanning/alerts?state=open&ref=${{ github.ref }}&per_page=100" --paginate > alerts.json

      - name: Build metrics row
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 scripts/collect_metrics.py jobs.json alerts.json "${{ github.run_id }}" "${{ github.sha }}" "$TS" > row.csv
          echo "Row:"; cat row.csv

      - name: Append to the metrics branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEADER="timestamp,run_id,sha,total_sec,lint_test_sec,terraform_sec,gitleaks_sec,codeql_sec,trivy_sec,checkov_sec,zap_sec,findings_total,critical,high,medium,low,unknown"
          URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TMP=$(mktemp -d)
          if git clone --depth 1 --branch metrics "$URL" "$TMP" 2>/dev/null; then
            cd "$TMP"
          else
            rm -rf "$TMP"; git clone --depth 1 "$URL" "$TMP"; cd "$TMP"
            git checkout --orphan metrics
            git rm -rf . >/dev/null 2>&1 || true
            echo "$HEADER" > metrics.csv
          fi
          cat "$GITHUB_WORKSPACE/row.csv" >> metrics.csv
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics.csv
          git commit -m "metrics: run ${{ github.run_id }}"
          git push origin metrics

  publish:
    name: Publish image (gated on security)
    runs-on: ubuntu-latest
    # runs ONLY if every quality + security job succeeded
    needs: [lint-test, terraform, gitleaks, codeql, trivy, checkov, zap]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image to GHCR
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}"
          docker build -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          echo "Published ${IMAGE}:${{ github.sha }}"